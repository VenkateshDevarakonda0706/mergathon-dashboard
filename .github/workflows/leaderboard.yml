name: Update Mergathon Leaderboard

on:
  schedule:
    # Run every 6 hours
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual triggers from the Actions tab

permissions:
  contents: write

jobs:
  update-leaderboard:
    name: Generate & commit leaderboard data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate leaderboard data
        run: npm run generate:leaderboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/mergathon-data.json
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update mergathon leaderboard data [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
